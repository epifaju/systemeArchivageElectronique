# Variables d’environnement : copier `.env.example` vers `.env` (non versionné). Voir `.gitignore`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archivage}
      POSTGRES_USER: ${POSTGRES_USER:-archivage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archivage}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    # Pas de `ports:` : PostgreSQL n'est joignable que sur le réseau Docker (backend → postgres:5432).
    # Cela évite tout conflit avec un PostgreSQL local ou d'autres conteneurs sur 5432/5433/…
    # Pour un client sur l'hôte (DBeaver, psql) : ajoutez par ex. dans docker-compose.override.yml :
    #   services:
    #     postgres:
    #       ports: ["15432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archivage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    ports:
      - "3310:3310"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-archivage}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-archivage}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-archivage}
      JWT_SECRET: ${JWT_SECRET:-change-me-use-at-least-256-bits-for-hs256-secret-key!!}
      STORAGE_PATH: /app/documents
      OCR_WORKERS: ${OCR_WORKERS:-2}
      OCR_MOCK: "false"
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-true}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      # Inclut le port par défaut du frontend Docker (FRONTEND_PUBLISHED_PORT ci‑dessous).
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:13100}
      APP_INGEST_WATCH_ENABLED: ${APP_INGEST_WATCH_ENABLED:-false}
      APP_INGEST_WATCH_DIRECTORY: ${APP_INGEST_WATCH_DIRECTORY:-/data/watch-incoming}
      APP_INGEST_WATCH_INTERVAL_MS: ${APP_INGEST_WATCH_INTERVAL_MS:-60000}
      APP_INGEST_WATCH_USER_ID: ${APP_INGEST_WATCH_USER_ID:-1}
      APP_INGEST_WATCH_DOCUMENT_TYPE_ID: ${APP_INGEST_WATCH_DOCUMENT_TYPE_ID:-1}
      APP_INGEST_WATCH_FOLDER_NUMBER: ${APP_INGEST_WATCH_FOLDER_NUMBER:-INBOX}
      APP_INGEST_WATCH_TITLE_PREFIX: ${APP_INGEST_WATCH_TITLE_PREFIX:-Import automatique}
      APP_INGEST_WATCH_LANGUAGE: ${APP_INGEST_WATCH_LANGUAGE:-FRENCH}
      APP_INGEST_WATCH_CONFIDENTIALITY: ${APP_INGEST_WATCH_CONFIDENTIALITY:-INTERNAL}
    volumes:
      - ./data/documents:/app/documents
      - ./data/watch-incoming:/data/watch-incoming
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    restart: unless-stopped
    # Port hôte configurable — 3000 est souvent déjà pris (Grafana, autre app).
    ports:
      - "${FRONTEND_PUBLISHED_PORT:-13100}:80"
    depends_on:
      - backend

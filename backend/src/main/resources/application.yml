# Les mots de passe et secrets doivent être fournis par variables d’environnement
# (ou fichier non versionné). Ne commitez pas de secrets réels.
spring:
  application:
    name: archivage-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/archivage}
    username: ${SPRING_DATASOURCE_USERNAME:archivage}
    password: ${SPRING_DATASOURCE_PASSWORD:archivage}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:60MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  jwt:
    # Défaut uniquement pour le dev local ; le profil `prod` exige JWT_SECRET (voir application-prod.yml).
    secret: ${JWT_SECRET:change-me-use-at-least-256-bits-for-hs256-secret-key!!}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
  storage:
    root-path: ${STORAGE_PATH:./data/documents}
  ocr:
    workers: ${OCR_WORKERS:2}
    lang-default: ${OCR_LANG_DEFAULT:fra+por}
    timeout-minutes: ${OCR_TIMEOUT_MINUTES:10}
    max-retries: ${OCR_MAX_RETRIES:3}
    mock: ${OCR_MOCK:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  clamav:
    enabled: ${CLAMAV_ENABLED:false}
    host: ${CLAMAV_HOST:localhost}
    port: ${CLAMAV_PORT:3310}
    connect-timeout-ms: ${CLAMAV_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${CLAMAV_READ_TIMEOUT_MS:120000}
  rate-limit:
    auth:
      max-requests: ${AUTH_RATE_LIMIT_MAX:30}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

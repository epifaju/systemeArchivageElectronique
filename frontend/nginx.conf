server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Vite émet le worker pdfjs en .mjs ; sans cette entrée, nginx peut servir du
    # application/octet-stream et le navigateur refuse l’import dynamique du module.
    types {
        application/javascript mjs;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

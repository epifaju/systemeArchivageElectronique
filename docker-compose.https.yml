# Profil optionnel : exposition HTTPS (PRD P1) via Nginx devant frontend + backend.
#
# Raccourcis (certificats + up) :
#   bash scripts/up-https.sh
#   .\scripts\up-https.ps1
#
# Ou manuellement :
#   bash scripts/generate-https-certs.sh
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up --build
#
# Ce fichier force VITE_API_URL vide au build du frontend (appels /api en same-origin)
# et définit un défaut CORS incluant https://localhost (surchargeable via .env).

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""

  backend:
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost,http://localhost:13100,http://localhost:5173,http://localhost:3000}

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTPS_GATEWAY_PORT:-443}:443"
    volumes:
      - ./nginx/gateway-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
